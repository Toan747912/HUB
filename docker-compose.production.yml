version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    expose:
      - "6379"

  ai-backend:
    image: ${IMAGE_REGISTRY:-local}/ai-backend:${IMAGE_TAG:-latest}
    build:
      context: ./Apps/ai-backend
      dockerfile: Dockerfile.production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # Supabase PostgreSQL connection string (pooled, e.g. via pgbouncer port 6543).
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required (Supabase Postgres connection string)}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REFRESH_SECRET: ${REFRESH_SECRET:?REFRESH_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "3001"

  frontend:
    image: ${IMAGE_REGISTRY:-local}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./Apps/frontend
      dockerfile: Dockerfile.production
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:?NEXT_PUBLIC_BACKEND_URL is required}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Docker sets HOSTNAME to the container ID by default; Next.js's
      # standalone server.js binds to process.env.HOSTNAME, so without this
      # override it binds to the container's own hostname/IP instead of all
      # interfaces — breaking both the in-container healthcheck (curls
      # 127.0.0.1) and nginx's proxy_pass to it.
      HOSTNAME: "0.0.0.0"
    depends_on:
      ai-backend:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - ai-backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro

volumes:
  redis-data:
