version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ai_backend
      POSTGRES_PASSWORD: dev-postgres-password-change-me
      POSTGRES_DB: ai_backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_backend"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ai-backend:
    build:
      context: ./Apps/ai-backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://ai_backend:dev-postgres-password-change-me@postgres:5432/ai_backend?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-jwt-secret-change-me
      REFRESH_SECRET: dev-refresh-secret-change-me
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ai-service:
    build:
      context: ./Apps/ai-service
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./Apps/frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
    depends_on:
      - ai-backend
      - ai-service

volumes:
  postgres_data:
