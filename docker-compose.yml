version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./Apps/backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000

  ai-service:
    build:
      context: ./Apps/ai-service
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./Apps/frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
    depends_on:
      - backend
      - ai-service
