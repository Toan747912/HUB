name: Code Quality

on:
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  formatting-and-static-analysis:
    name: Format & lint · ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [ai-backend, backend, frontend]
    defaults:
      run:
        working-directory: Apps/${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Formatting check (Prettier)
        run: npm run format:check

      - name: Static analysis (ESLint)
        run: npm run lint

  coverage-threshold:
    name: Coverage threshold · ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [ai-backend, backend, frontend]
    defaults:
      run:
        working-directory: Apps/${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Enforce coverage threshold
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-coverage-${{ matrix.app }}
          path: Apps/${{ matrix.app }}/coverage
          if-no-files-found: ignore
          retention-days: 7
