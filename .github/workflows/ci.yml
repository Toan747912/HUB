name: CI

on:
  push:
    branches: [main, develop, "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # Stage 2-6: Node toolchain setup, install, typecheck, lint, unit tests
  node-app:
    name: Node · ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [ai-backend, backend, frontend]
    defaults:
      run:
        working-directory: Apps/${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        if: matrix.app != 'backend'
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests (with coverage)
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.app }}
          path: Apps/${{ matrix.app }}/coverage
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        if: matrix.app == 'ai-backend' || matrix.app == 'frontend'
        run: npm run build

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.app }}
          path: Apps/${{ matrix.app }}/npm-debug.log
          if-no-files-found: ignore
          retention-days: 14

  # Stage 2-6 for the Python service
  python-app:
    name: Python · ai-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Apps/ai-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: Apps/ai-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Lint (ruff)
        run: ruff check .

      - name: Unit tests (with coverage)
        run: pytest --cov=app --cov-report=xml --cov-report=term -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ai-service
          path: Apps/ai-service/coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  # Stage 7: Integration tests — boot the real stack via docker compose and
  # verify service-to-service wiring (Mongo, Redis, HTTP health checks).
  integration:
    name: Integration (docker compose)
    runs-on: ubuntu-latest
    needs: [node-app, python-app]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for services to become healthy
        run: |
          set -e
          check() {
            name="$1"; url="$2"
            for i in $(seq 1 30); do
              if curl -sf "$url" > /dev/null; then
                echo "$name is up"
                return 0
              fi
              sleep 2
            done
            echo "$name did not become healthy in time"
            return 1
          }
          check ai-backend http://localhost:3001/health
          check ai-service http://localhost:8000/api/health
          check frontend http://localhost:3000/

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml down -v

  # Stage 10: Docker image build (build always; push only on main/tags)
  docker-build:
    name: Docker · ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: [node-app, python-app]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [ai-backend, backend, frontend, ai-service]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: Apps/${{ matrix.app }}
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # Stage 11: Security scan — dependency audit, secret detection, container scan
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret detection (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm audit — ai-backend
        working-directory: Apps/ai-backend
        run: npm audit --omit=dev --audit-level=high || true

      - name: npm audit — backend
        working-directory: Apps/backend
        run: npm audit --omit=dev --audit-level=high || true

      - name: npm audit — frontend
        working-directory: Apps/frontend
        run: npm audit --omit=dev --audit-level=high || true

      - name: Filesystem vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          scan-ref: Apps
          severity: CRITICAL,HIGH
          exit-code: "0"
          format: table

  # Stage 12: Artifact publishing — single required status check
  ci-complete:
    name: CI complete
    runs-on: ubuntu-latest
    needs: [node-app, python-app, integration, docker-build, security-scan]
    if: always()
    steps:
      - name: Verify all stages succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required stages failed."
            exit 1
          fi
          echo "All stages passed."
