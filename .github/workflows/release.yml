name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  packages: write

jobs:
  validate-tag:
    name: Validate version tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
    steps:
      - name: Parse and validate semantic version
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' is not a valid semantic version (expected vX.Y.Z or vX.Y.Z-suffix)"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push-images:
    name: Build & push · ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        app: [ai-backend, backend, frontend, ai-service]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: Apps/${{ matrix.app }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ needs.validate-tag.outputs.version }}
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build-and-push-images]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes and publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.version }}
          name: ${{ needs.validate-tag.outputs.version }}
          prerelease: ${{ needs.validate-tag.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## Images published to GitHub Container Registry

            - `ghcr.io/${{ github.repository }}/ai-backend:${{ needs.validate-tag.outputs.version }}`
            - `ghcr.io/${{ github.repository }}/backend:${{ needs.validate-tag.outputs.version }}`
            - `ghcr.io/${{ github.repository }}/frontend:${{ needs.validate-tag.outputs.version }}`
            - `ghcr.io/${{ github.repository }}/ai-service:${{ needs.validate-tag.outputs.version }}`
