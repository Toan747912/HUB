name: Dependency Audit

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: {}

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  npm-audit:
    name: npm audit · ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [ai-backend, backend, frontend]
    defaults:
      run:
        working-directory: Apps/${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Known CVEs (npm audit, high+critical)
        run: npm audit --audit-level=high

      - name: Outdated packages report
        if: always()
        run: npm outdated || true

  pip-audit:
    name: pip-audit · ai-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Apps/ai-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: Apps/ai-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-audit

      - name: Known CVEs (pip-audit)
        run: pip-audit -r requirements.txt

  license-compliance:
    name: License compliance
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [ai-backend, backend, frontend]
    defaults:
      run:
        working-directory: Apps/${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for disallowed licenses
        run: npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0"

  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [npm-audit, pip-audit, license-compliance]
    if: failure()
    steps:
      - name: Summarize failure
        run: |
          echo "::warning::Dependency audit found issues. Review the failed job logs above."
